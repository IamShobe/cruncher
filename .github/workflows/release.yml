name: Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "@cruncher/app@*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish npm packages to registry
        run: pnpm run release
        env:
          NPM_CONFIG_PROVENANCE: true

  build-and-publish:
    needs: publish-npm
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/@cruncher/app@')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # Linux and macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish Electron app
        run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Add other environment variables as needed for your publisher (e.g., S3, DigitalOcean, etc.)
