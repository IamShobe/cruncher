name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-npm:
    name: Release npm packages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      electron-version-changed: ${{ steps.electron-version.outputs.changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset-version
          publish: pnpm run changeset-publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Empty string (not omitted) lets npm fall back to OIDC trusted publishing.
          # See: https://github.com/changesets/action/issues/542
          NODE_AUTH_TOKEN: ""

      - name: Check if Electron app version changed
        id: electron-version
        run: |
          PREV=$(git show HEAD~1:apps/cruncher/package.json 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))" || echo "")
          CURR=$(node -p "require('./apps/cruncher/package.json').version")
          if [ -n "$PREV" ] && [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  publish-electron:
    name: Publish Electron app (${{ matrix.os }})
    needs: release-npm
    runs-on: ${{ matrix.os }}
    if: always() && (needs.release-npm.outputs.published == 'true' || needs.release-npm.outputs.electron-version-changed == 'true' || github.event_name == 'workflow_dispatch')
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm run build --filter='./packages/**'

      - name: Build and publish Electron app
        run: pnpm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-electron:
    name: Publish Electron release
    needs: [release-npm, publish-electron]
    runs-on: ubuntu-latest
    if: always() && needs.publish-electron.result == 'success' && (needs.release-npm.outputs.published == 'true' || needs.release-npm.outputs.electron-version-changed == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/cruncher/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          {
            echo 'changelog<<EOF'
            awk '/^## /{if(found) exit; found=1; next} found{print}' apps/cruncher/CHANGELOG.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Publish draft release with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          echo "${CHANGELOG}" > /tmp/release-notes.md
          gh release edit "v${VERSION}" \
            --draft=false \
            --notes-file /tmp/release-notes.md
