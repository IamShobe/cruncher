<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Cruncher</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #2e3440;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      #initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      #initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(136, 192, 208, 0.2);
        border-top-color: #88c0d0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/processes/frontend/main.tsx"></script>
  </body>
</html>
